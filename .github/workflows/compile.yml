name: Compile Dirty Cow Exploit

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libcrypt-dev
    
    - name: Compile exploit
      run: |
        gcc -Wall -O2 -static -o dirtycow dirtycow.c -lpthread -lcrypt
        strip dirtycow
        ls -lah dirtycow
    
    - name: Upload binary as artifact
      uses: actions/upload-artifact@v3
      with:
        name: dirtycow-binary
        path: dirtycow
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v1.0.${{ github.run_number }}
        release_name: Dirty Cow v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
    
    - name: Upload Release Asset
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dirtycow
        asset_name: dirtycow
        asset_content_type: application/octet-stream
