name: Cross-Compile Dirty Cow for Multiple Architectures

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        target:
          - { arch: armv7,   cc: arm-linux-gnueabi-gcc,    pkg: gcc-arm-linux-gnueabi, libpkg: libcrypt-dev:armhf }
          - { arch: arm64,   cc: aarch64-linux-gnu-gcc,    pkg: gcc-aarch64-linux-gnu, libpkg: libcrypt-dev:arm64 }
          - { arch: mips,    cc: mips-linux-gnu-gcc,       pkg: gcc-mips-linux-gnu, libpkg: libcrypt-dev }
          - { arch: mipsel,  cc: mipsel-linux-gnu-gcc,     pkg: gcc-mipsel-linux-gnu, libpkg: libcrypt-dev }
          - { arch: x86_64,  cc: gcc,                      pkg: gcc, libpkg: libcrypt-dev }
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.target.pkg }} ${{ matrix.target.libpkg }}
    
    - name: Compile for ${{ matrix.target.arch }}
      run: |
        # For ARM 32-bit, use dynamic linking if static fails
        if [ "${{ matrix.target.arch }}" == "armv7" ]; then
          ${{ matrix.target.cc }} -Wall -O2 -o dirtycow-${{ matrix.target.arch }} dirtycow.c -lpthread -lcrypt
        else
          ${{ matrix.target.cc }} -static -Wall -O2 -o dirtycow-${{ matrix.target.arch }} dirtycow.c -lpthread -lcrypt
        fi
        file dirtycow-${{ matrix.target.arch }}
    
    - name: Upload ${{ matrix.target.arch }} binary
      uses: actions/upload-artifact@v4
      with:
        name: dirtycow-${{ matrix.target.arch }}
        path: dirtycow-${{ matrix.target.arch }}
